<!DOCTYPE html>
<html>

<head>
<title>ProspectFlow Login</title>
<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>ProspectFlow Auth</h2>

<input id="reg-email" placeholder="Registration Email">
<input id="reg-password" type="password" placeholder="Registration Password">

<button onclick="register()">Register</button>

<hr>

<input id="email" placeholder="Login Email">
<input id="password" type="password" placeholder="Login Password">

<button onclick="login()">Login</button>

<hr>

<h3>Connect CRM</h3>

<input id="token" placeholder="GHL Token">
<input id="location" placeholder="Location ID">

<button onclick="connectCRM()">Connect CRM</button>

<p id="msg" style="color:red; font-weight:bold;"></p>

</div>


<script>

let jwtToken = ""
let oauthRedirectUri = ""
let oauthState = ""

// Extract OAuth parameters on load
window.onload = () => {
  const urlParams = new URLSearchParams(window.location.search);
  oauthRedirectUri = urlParams.get('redirect_uri') || "";
  oauthState = urlParams.get('state') || "";

  if(oauthRedirectUri) {
    document.getElementById("msg").style.color = "blue";
    document.getElementById("msg").innerText = "ChatGPT Auth Flow Started. Please login and verify your CRM to continue.";
  }
}

async function register(){
const email = document.getElementById("reg-email").value
const password = document.getElementById("reg-password").value

const res = await fetch("https://prospectflow-crm-gpt-integration-production.up.railway.app/api/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

const data = await res.json()
if(data.success){
document.getElementById("msg").style.color = "green"
document.getElementById("msg").innerText="Registration successful. You can now login."
}else{
document.getElementById("msg").style.color = "red"
document.getElementById("msg").innerText=data.message
alert("Registration failed: " + data.message)
}
}


async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const res = await fetch("https://prospectflow-crm-gpt-integration-production.up.railway.app/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

const data = await res.json()

if(data.success){

jwtToken = data.token
document.getElementById("msg").style.color = "green"
document.getElementById("msg").innerText="Login successful"

}else{
document.getElementById("msg").style.color = "red"
document.getElementById("msg").innerText=data.message
alert("Login failed: " + data.message)
}

}



async function connectCRM(){

if (!jwtToken) {
    alert("Please login first before connecting the CRM.");
    return;
}

const token = document.getElementById("token").value
const location = document.getElementById("location").value

const res = await fetch("https://prospectflow-crm-gpt-integration-production.up.railway.app/api/connect-crm",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+jwtToken
},

body:JSON.stringify({
ghl_token:token,
location_id:location
})

})

const data = await res.json()

if(data.success){

document.getElementById("msg").style.color = "green"
document.getElementById("msg").innerText="CRM Connected! Generating GPT Access..."

    // If no redirect URI is present, it means the user is testing the page directly (not via ChatGPT).
    if (!oauthRedirectUri) {
        document.getElementById("msg").style.color = "green";
        document.getElementById("msg").innerText = "CRM Connected successfully! (No GPT redirect detected)";
        return;
    }

    // Now instead of going straight to OpenAI, we hit our backend to generate the temp oauth code
    try {
      const codeRes = await fetch("https://prospectflow-crm-gpt-integration-production.up.railway.app/api/oauth/generate-code", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + jwtToken,
          "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify({
          redirect_uri: oauthRedirectUri,
          state: oauthState
        })
      });

      const codeData = await codeRes.json();

      if(codeData.success){
        document.getElementById("msg").innerText="Success! Returning you to ChatGPT...";
        setTimeout(()=>{
          window.location.href = codeData.redirect_to;
        }, 1500)
      } else {
          document.getElementById("msg").style.color = "red"
          document.getElementById("msg").innerText="OAuth Failed: " + codeData.message
          alert("Failed to generate GPT code: " + codeData.message)
      }

    } catch (e) {
      console.error(e);
      document.getElementById("msg").style.color = "red";
      document.getElementById("msg").innerText = "Network Error generating code.";
    }

}else{
document.getElementById("msg").style.color = "red"
document.getElementById("msg").innerText=data.message
alert("CRM Connection Failed: " + data.message)
}

}

</script>

</body>
</html>
